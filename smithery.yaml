name: weather-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: get_current_conditions
  description: Get current weather conditions for a city.
  parameters:
  - name: city
    type: string
    required: true
  - name: units
    type: string
    required: false
- name: get_forecast
  description: Get multi-day weather forecast for a city.
  parameters:
  - name: city
    type: string
    required: true
  - name: days
    type: integer
    required: false
  - name: units
    type: string
    required: false
- name: get_historical_weather
  description: Get historical weather data for a city and date range.
  parameters:
  - name: city
    type: string
    required: true
  - name: start_date
    type: string
    required: true
  - name: end_date
    type: string
    required: true
  - name: units
    type: string
    required: false
- name: get_agricultural_alerts
  description: Get agricultural weather alerts and growing condition analysis.
  parameters:
  - name: city
    type: string
    required: true
  - name: crop_type
    type: string
    required: false
- name: get_severe_weather_warnings
  description: Check for severe weather warnings and safety advisories.
  parameters:
  - name: city
    type: string
    required: true
